front:
  text: 元陽子五假論夫修身養命學道求仙志人若修行未有功行但存一念必以成就功行未滿但住浮世或有邪魔魍魎百魅鬼怪精靈見入於假盡乃奔走不敢奔來作其患難但依吾祝呪焚香齋戒靜心默念每假祝呪各持四十九日但有災厄險難臨身速於默念一遍以手捉一物而投避或作遊神或分形化體隱入木火之內鑽潛身入金中解假水中下存溺其有災厄臨險當時投避除以是天機只合口口相傳余恐在世志學之人必有悟忘遂乃録寫傳留於世勿以泄漏傳薄器之輩敗道之徒遇人不得隱匿先又殃及九祖不擇人傳毀漏天機沉埋九族永為下鬼不能受生
  hash: sha256:7148da2bf3e7f1cffc504363fc7c708a93b7117c019058dda619a6606348a0de
  markers:

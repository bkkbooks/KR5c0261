body:
  text: 金假第一西方庚辛白虎之神九曜之尊太白守位紫微靈星惟命之主體髓堅牢七𩲸莫離三乎即至七召歸體刀劒分身接骨續筋後以化體除其苦厄聽吾祝呪應命而行呪曰西方庚辛太微玄真內應六腑化為肺神見於無上遊於丹田固護我命用之神仙急急如律令勑其祝呪庚辛日酉時焚香起念不得開口以舌柱上齶想念之可以持四十九日如有災厄不以時日行住坐默想念一遍以手執刀任乃分身並無赤血雖有白膏而出凝結不流過後却返自然接續歸還木假第二東方青龍屬於甲乙應春之令歲星之兵能生其氣方蘂光榮內應肝神丞相之位吾若有難三呼即現分化身形逺遊諸處要歸本位見物而至呪曰東方甲乙青龍之室金木相形返為骨肉真氣鎮定莫離左右分身隱匿思之返至急急如律令其祝呪取庚辛日卯時焚香默念不令人聞思之為上可持四十九日如有災厄不以時候晨速以默念不俱行住坐卧默念一遍逢木將身隱於其中自免災禍分身而去却要歸時思於舊木便還歸去返至本處水假第三比方壬癸亥子之位玄武為君能生萬潤光澤榮溢內應於賢列女之容性命根宗血為水號變錬精氣本屬是陽隂中有火濟於浮世吾若有災三呼應現七召隨身入水不溺土木扶持魂𩲸各居三彭自伏入於九域呪曰星辰之真玄武隨身勾陳左助青龍輔弼白虎扶持騰蛇跨下隨吾軀形思之還返急急如律令勑其祝呪取庚辛日子時焚香起念不得開口只以默念一遍可持四十九日如有災厄不以行住坐卧默念一遍將身入水免其災厄不以多少日數水下安居却要返歸想於賢氣自以出水免其災厄火假第四南方朱雀位屬丙丁熒惑惑曜火神炎盛燒除三彭六神水護魂𩲸澄淨六根堅牢內屬心主吾若有難三呼即至不離左右丙丁是火壬癸是殺吾入於假魂神不朽我身是水我命是土土水相刑火不侵體呪曰南方丙丁赤龍俱停隂神避位陽官不迎思之返至用之日成急急如律令勑其祝呪取庚辛日午時焚香起念不令人聞思之為上可持四十九日如有災厄不拘時辰速入靜室中安卧默念祝呪一遍手握竹木而卧百魅千妖悉皆而走便以閉息絶氣假作身死家人不嘵將謂殂身任將停於沒以衣蓋覆分化遊神任令葬其神魂𩲸神主默然而全不動搖其體隨焰而返歸焱雖盛不能燒之火消煙冷覔之無蹤土假第五中央戊已萬神之位三魂養土土能生物物化變氣三魂隨形七𩲸逐體吾全身命念土之修養土能生物化變形四象歸土得土而生三呼即至七召歸軀除其災厄聽吾祝呪隨形化體呪曰中央戊已內藏元氣黃色立堅運之可理丹陽莫辭朱隂共義生我得達四肢黃益勿令大起急急如律令勑其祝呪取庚辛日辰時焚香起念不得人聞可持四十九日如有災厄不拘時辰行住坐卧只用默念一遍可以捉一物隱地入墻人可不見其所捉物代為形影起而去免避輪回換過難了却返歸還右五假篇是神仙隱世之法留傳於世不可泄漏祕密之真修如有後學志士默念修養堅心持念無令觸犯今聞其法終不成審而持念念不得亂泄天機長白山真人元陽子隱身法傳與有道心人依此行用無不驗矣元陽子五假論
  hash: sha256:a66d5515d5450cfac72c94d46eb9095e18a05d81aab0c28700b9c66e40224d73

front:
  text: 元陽子五假論夫修身養命學道求仙志人若修行未有功行但存一念必以成就功行未滿但住浮世或有邪魔魍魉百魅鬼怪精靈見入於假盡乃奔走不敢奔來作其患難但依吾祝呪焚香齋戒静心黙念毎假祝呪各持四十九日但有灾厄險難臨身速於黙念一遍以手捉一物而投避或作游神或分形化體隱入木火之内鑚潜身入金中解假水中下存溺其有灾厄臨險當時投避除以是天機只合口口相傳余恐在世志學之人必有悟忘遂乃録冩傳留於世勿以泄漏傳薄噐之軰敗道之徒遇人不得隱匿先又殃及九祖不擇人傳毀漏天機沉埋九族永爲下鬼不能受生
  hash: sha256:2c49e363b5b799f94449a70db7090dc3b13b30bbaf6820f4a6b76f6a61c8c2b4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0261_SJB_000-180652b, image: sjb/18/180652b.png}
body:
  text: 金假第一西方庚辛白虎之神九曜之尊太白守位紫微靈星惟命之主體髓堅牢七𩲸莫離三乎即至七召歸體刀劒分身接骨續筋後以化體除其苦厄聽吾祝呪應命而行呪曰西方庚辛太微玄眞内應六腑化爲肺神見於無上遊於丹田固護我命用之神仙急急如律令勑其祝呪庚辛日酉時焚香起念不得開口以舌柱上㗁想念之可以持四十九日如有灾厄不以時日行住坐黙想念一遍以手執刀任乃分身並無赤血雖有白膏而出凝結不流過後却返自然接續歸還木假第二東方青龍屬於甲乙應春之令歲星之兵能生其氣方蘂光榮内應肝神丞相之位吾若有難三呼即現分化身形逺遊諸處要歸本位見物而至呪曰東方甲乙青龍之室金木相形返爲骨肉眞氣鎮定莫離左右分身隱匿思之返至急急如律令其祝呪取庚辛日卯時焚香黙念不令人聞思之爲上可持四十九日如有灾厄不以時候晨速以黙念不俱行住坐卧黙念一遍逢木將身隱於其中自免灾禍分身而去却要歸時思於舊木便還歸去返至本處水假第三比方壬癸亥子之位玄武為君能生萬潤光澤榮溢内應於賢列女之容性命根宗血爲水號變錬精氣本屬是陽隂中有火濟於浮世吾若有灾三呼應現七召隨身入水不溺土木扶持䰟𩲸各居三彭自伏入於九域呪曰星辰之真玄武隨身勾陳左助青龍輔弼白虎扶持騰蛇跨下隨吾軀形思之還返急急如律令勑其祝呪取庚辛日子時焚香起念不得開口只以黙念一遍可持四十九日如有灾厄不以行住坐卧黙念一遍將身入水免其灾厄不以多少日數水下安居却要返歸想於賢氣自以岀水免其灾厄火假第四南方朱雀位屬丙丁熒惑惑曜火神炎盛焼除三彭六神水護䰟𩲸澄淨六根堅牢内屬心主吾若有難三呼即至不離左右丙丁是火壬癸是殺吾入於假䰟神不朽我身是水我命是土土水相刑火不侵體呪曰南方丙丁赤龍俱停隂神避位陽官不迎思之返至用之日成急急如律令勑其祝呪取庚辛日午時焚香起念不令人聞思之爲上可持四十九日如有灾厄不拘時辰速入靜室中安卧黙念祝呪一遍手握竹木而卧百魅千妖悉皆而走便以閉息絶氣假作身死家人不嘵將謂殂身任將停於没以衣蓋覆分化游神任令葬其神䰟𩲸神主黙然而全不動搖其體隨焰而返歸焱雖盛不能焼之火消烟冷覔之無蹤土假第五中央戊已萬神之位三䰟養土土能生物物化變氣三䰟隨形七𩲸逐體吾全身命念土之修養土能生物化變形四象歸土得土而生三呼即至七召歸軀除其灾厄聽吾祝呪隨形化體呪曰中央戊已内藏元氣黄色立堅運之可理丹陽莫辭朱隂共義生我得達四肢黃益勿令大起急急如律令勑其祝呪取庚辛日辰時焚香起念不得人聞可持四十九日如有灾厄不拘時辰行住坐卧只用黙念一遍可以捉一物隱地入墻人可不見其所捉物代爲形影起而去免避輪迴換過難了却返歸還右五假篇是神仙隱世之法留傳於世不可泄漏秘宻之眞修如有後學志士黙念修養堅心持念無令觸犯今聞其法終不成審而持念念不得亂泄天機長白山眞人元陽子隱身法傳與有道心人依此行用無不驗矣元陽子五假論
